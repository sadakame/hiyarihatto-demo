<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ヒヤリハットAIデモ</title>

<style>

body{
font-family:sans-serif;
background:#f3f5f7;
padding:20px;
}

.box{
max-width:500px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
}

button{
width:100%;
padding:10px;
margin-top:10px;
background:#2b7cff;
color:white;
border:none;
}

img{
width:100%;
margin-top:15px;
}

</style>
</head>

<body>

<div class="box">

<h2>ヒヤリハットAIデモ</h2>

<p>作業内容を入力してください</p>

<input id="q" placeholder="例：玉掛、足場、溶接">

<button onclick="search()">検索</button>

<div id="result"></div>

</div>

<script>

const data=[

{
keyword:"玉掛",
hazard:"吊荷落下",
cause:"吊具不備",
counter:"適正吊具使用・あだ巻き確認",
img:"https://dummyimage.com/600x350/eeeeee/000000&text=玉掛+吊荷落下"
},

{
keyword:"足場",
hazard:"激突",
cause:"周囲確認不足",
counter:"監視人配置・周囲確認",
img:"https://dummyimage.com/600x350/eeeeee/000000&text=足場+激突"
},

{
keyword:"溶接",
hazard:"感電",
cause:"水分付着",
counter:"アース確認・保護具",
img:"https://dummyimage.com/600x350/eeeeee/000000&text=溶接+感電"
},

{
keyword:"回転機",
hazard:"巻き込まれ",
cause:"運転中作業",
counter:"停止後作業",
img:"https://dummyimage.com/600x350/eeeeee/000000&text=回転機+巻き込まれ"
},

{
keyword:"高温",
hazard:"高温接触",
cause:"温度確認不足",
counter:"温度・圧力確認",
img:"https://dummyimage.com/600x350/eeeeee/000000&text=高温+接触"
},

{
keyword:"転倒",
hazard:"足場転倒",
cause:"開口部養生不足",
counter:"危険箇所確認",
img:"https://dummyimage.com/600x350/eeeeee/000000&text=足場+転倒"
}

]

function search(){

let q=document.getElementById("q").value

let r=data.find(x=>q.includes(x.keyword) || x.keyword.includes(q))

if(!r){

document.getElementById("result").innerHTML="該当事例なし"

return

}

document.getElementById("result").innerHTML=`

<h3>${r.hazard}</h3>

<p><b>原因</b><br>${r.cause}</p>

<p><b>対策</b><br>${r.counter}</p>

<img src="${r.img}">

`

}

</script>

</body>
</html>
